name: Build NexVR Engine

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ "published" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup MSVC & CMake
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup DXC
      uses: shader-slang/setup-dxc@v3

    - name: Configure CMake
      run: cmake -B build -S . -A x64

    - name: Build C++ Components (DLL & CLI)
      run: cmake --build build --config Release

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Launcher Dependencies
      working-directory: ./launcher
      run: npm install

    - name: Build and Package Electron App
      working-directory: ./launcher
      # This triggers vite build, tsc, and electron-builder
      run: npm run pack

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nexvr-engine-installer
        path: launcher/dist-electron/NexVR Engine Setup*.exe
