name: Build NexVR Engine

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ "published" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup MSVC & CMake
      uses: ilammy/msvc-dev-cmd@v1

    - name: Download Official DXC (for SPIR-V support)
      shell: cmd
      run: |
        curl.exe -L https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.7.2308/dxc_2023_08_14.zip -o dxc.zip
        7z.exe x dxc.zip -odxc -y

    - name: Setup Vulkan SDK
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $VulkanURL = "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe"
        Write-Host "Downloading Vulkan SDK..."
        Invoke-WebRequest -Uri $VulkanURL -OutFile VulkanSDK.exe
        Write-Host "Installing Vulkan SDK..."
        Start-Process -FilePath ".\VulkanSDK.exe" -ArgumentList "--root", "C:\VulkanSDK", "--accept-licenses", "--default-answer", "--confirm-command", "install" -Wait -NoNewWindow
        Write-Host "Configuring Environment..."
        echo "VULKAN_SDK=C:\VulkanSDK" >> $env:GITHUB_ENV
        echo "C:\VulkanSDK\Bin" >> $env:GITHUB_PATH

    - name: Configure CMake
      run: cmake -B build -S . -A x64 -DDXC_EXECUTABLE="${{ github.workspace }}/dxc/bin/x64/dxc.exe"

    - name: Build C++ Components (DLL & CLI)
      run: cmake --build build --config Release

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Launcher Dependencies
      working-directory: ./launcher
      run: npm install

    - name: Build and Package Electron App
      working-directory: ./launcher
      # This triggers vite build, tsc, and electron-builder
      run: npm run pack

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nexvr-engine-installer
        path: launcher/dist-electron/NexVR Engine Setup*.exe
